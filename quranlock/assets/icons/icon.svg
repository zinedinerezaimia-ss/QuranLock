        fill="url(#gold)" opacity="0.8"/>
  <line x1="256" y1="340" x2="256" y2="420" stroke="#0a1628" stroke-width="3"/>
  
  <!-- Decorative dots -->
  <circle cx="256" cy="140" r="8" fill="url(#gold)" opacity="0.6"/>
  <circle cx="220" cy="160" r="5" fill="url(#gold)" opacity="0.4"/>
  <circle cx="292" cy="160" r="5" fill="url(#gold)" opacity="0.4"/>
