name: Build & Deploy to TestFlight

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Install Ruby & Fastlane
        run: |
          gem install bundler
          gem install fastlane

      - name: Install Certificates
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          PROVISION_PROFILE_BASE64: ${{ secrets.PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          echo -n "$P12_BASE64" | base64 --decode -o $RUNNER_TEMP/cert.p12
          
          if [ -z "$P12_PASSWORD" ]; then
            security import $RUNNER_TEMP/cert.p12 -A -t cert -f pkcs12 -k $KEYCHAIN_PATH -P ""
          else
            security import $RUNNER_TEMP/cert.p12 -A -t cert -f pkcs12 -k $KEYCHAIN_PATH -P "$P12_PASSWORD"
          fi
          
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo -n "$PROVISION_PROFILE_BASE64" | base64 --decode -o ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Resolve Swift Packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project QuranLock.xcodeproj \
            -scheme QuranLock \
            -clonedSourcePackagesDirPath SourcePackages

      - name: Build & Archive
        run: |
          xcodebuild archive \
            -project QuranLock.xcodeproj \
            -scheme QuranLock \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/QuranLock.xcarchive \
            -clonedSourcePackagesDirPath SourcePackages \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=J875R59LND \
            PROVISIONING_PROFILE_SPECIFIER="QuranLock AppStore" \
            CODE_SIGN_ENTITLEMENTS=QuranLock/QuranLock.entitlements

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>J875R59LND</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.rezaimia.QuranLock</key>
                  <string>QuranLock AppStore</string>
              </dict>
              <key>signingStyle</key>
              <string>manual</string>
          </dict>
          </plist>
          EOF
          
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/QuranLock.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          xcrun altool --upload-app \
            -f $RUNNER_TEMP/export/*.ipa \
            -t ios \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID" \
            --show-progress
